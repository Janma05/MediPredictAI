{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning">
            <h3>Edit Patient</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Full Name</label>
                    <input type="text"
                           name="full_name"
                           class="form-control"
                           value="{{ patient.full_name }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Date of Birth</label>
                    <input type="date"
                           name="dob"
                           class="form-control"
                           value="{{ patient.dob }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           value="{{ patient.email }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Glucose</label>
                    <input type="number"
                           step="0.1"
                           name="glucose"
                           class="form-control"
                           value="{{ patient.glucose }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Haemoglobin</label>
                    <input type="number"
                           step="0.1"
                           name="haemoglobin"
                           class="form-control"
                           value="{{ patient.haemoglobin }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Cholesterol</label>
                    <input type="number"
                           step="0.1"
                           name="cholesterol"
                           class="form-control"
                           value="{{ patient.cholesterol }}"
                           required>
                </div>

                <button type="submit"
                        class="btn btn-success">
                    Update Patient
                </button>

                <a href="{{ url_for('patients') }}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
