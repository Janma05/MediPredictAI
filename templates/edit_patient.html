{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            <h3 class="mb-0">Edit Patient Details</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>

                    <input type="text"
                           name="full_name"
                           class="form-control"
                           value="{{ patient.full_name }}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Date of Birth</label>

                    <input type="date"
                           name="dob"
                           class="form-control"
                           value="{{ patient.dob }}"
                           max="{{ today }}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           value="{{ patient.email }}"
                           pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$"
                           required>

                    <small class="text-muted">
                        Enter a valid email address.
                    </small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Glucose Level</label>

                    <input type="number"
                           step="0.1"
                           min="1"
                           name="glucose"
                           class="form-control"
                           value="{{ patient.glucose }}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Haemoglobin Level</label>

                    <input type="number"
                           step="0.1"
                           min="1"
                           name="haemoglobin"
                           class="form-control"
                           value="{{ patient.haemoglobin }}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cholesterol Level</label>

                    <input type="number"
                           step="0.1"
                           min="1"
                           name="cholesterol"
                           class="form-control"
                           value="{{ patient.cholesterol }}"
                           required>
                </div>

                <div class="d-flex gap-2">

                    <button type="submit"
                            class="btn btn-success">
                        Update Patient
                    </button>

                    <a href="{{ url_for('patients') }}"
                       class="btn btn-secondary">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
